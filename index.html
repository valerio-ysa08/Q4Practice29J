<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Switch Statement</h1>
<button type="btn btn-success" onclick="teamRank()">Rank</button>

    <script>

    let team = "Green"; //string

    switch (team) {
        case "Green" :
            alert ("Go Green Hornets! For the Win!");
            break;

        case "Blue" :
            alert ("Go Blue Bears!");
            break;

        case "Red" :
            alert ("Laban, Red Bulldogs!");
            break;

        case "Yellow" :
            alert ("Go Yellow Tigers!");
            break;

        default:
            alert ("No team found.");
    }

    function teamRank() {
        let rank = "1st";

        switch (rank){
            case "1st" :
            message = "Champion!"
            break;

            case "2nd" :
            message = "Second Place!"
            break;

            case "3rd" :
            message = "Third Place!"
            break;

            case "4th" :
            message = "Fourth Place!"
            break;

            default:
                message = "Ranking could not be determined.";
        }
            alert(message);
    }

    </script>

</body>
</html>
